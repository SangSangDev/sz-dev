services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: szdev
      MYSQL_USER: szdev_user
      MYSQL_PASSWORD: szdev_password
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Initialize with existing script
      - ./init_all.sql:/docker-entrypoint-initdb.d/01_init_all.sql
      # Custom migration for social features
      - ./migration_01_social.sql:/docker-entrypoint-initdb.d/02_migration_social.sql
      # Menu columns update migration
      - ./migration_02_menu_update.sql:/docker-entrypoint-initdb.d/03_migration_menu_update.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
