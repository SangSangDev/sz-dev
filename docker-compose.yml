services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-szdev}
      MYSQL_USER: ${MYSQL_USER:-szdev_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-szdev_password}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:3306:3306" # 127.0.0.1로 바인딩하여 외부 노출 차단
    volumes:
      - mysql_data:/var/lib/mysql
      # Initialize with existing script
      - ./init_all.sql:/docker-entrypoint-initdb.d/01_init_all.sql
      # Custom migration for social features
      - ./migration_01_social.sql:/docker-entrypoint-initdb.d/02_migration_social.sql
      # Menu columns update migration
      - ./migration_02_menu_update.sql:/docker-entrypoint-initdb.d/03_migration_menu_update.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-szdev_redis}
    ports:
      - "127.0.0.1:6379:6379" # 127.0.0.1로 바인딩하여 외부 노출 차단
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
